services:
  - type: web
    name: wikipedia-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: INTERNAL_API_HOSTPORT
        fromService:
          type: web
          name: wikipedia-api
          property: hostport

  - type: web
    name: wikipedia-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wikipedia-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wikipedia-redis
          property: connectionString
      - key: ELASTICSEARCH_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_BOOTSTRAP_USERNAME
        value: admin
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false

  - type: worker
    name: wikipedia-worker
    runtime: python
    rootDir: worker
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    disk:
      name: wikipedia-dump
      mountPath: /data
      sizeGB: 50
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wikipedia-postgres
          property: connectionString
      - key: ELASTICSEARCH_URL
        sync: false
      - key: WIKIPEDIA_DUMP_URL
        value: https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2
      - key: DUMP_PATH
        value: /data/enwiki-latest-pages-articles.xml.bz2
      - key: BATCH_SIZE
        value: "100"
      - key: RUN_ONCE
        value: "false"
      - key: REFRESH_INTERVAL_SECONDS
        value: "86400"

  - type: keyvalue
    name: wikipedia-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: wikipedia-postgres
    plan: basic-256mb
    databaseName: wikipedia
    user: wiki
    postgresMajorVersion: "15"
